name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v* tag name to publish (for example, v1.2.3)
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/codex-subagent-router/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Validate release tag and project version
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: python .github/scripts/validate_release.py

      - name: Run checks
        run: |
          uv run pytest
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy

      - name: Build distributions
        run: uv build --no-sources

      - name: Smoke test wheel command
        run: uv run --isolated --no-project --with dist/*.whl codex-subagent-router --help

      - name: Smoke test source distribution command
        run: uv run --isolated --no-project --with dist/*.tar.gz codex-subagent-router --help

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
