name: Release (TestPyPI dry run)

# Manual dry run of the full publish pipeline against TestPyPI. TestPyPI is
# independent of PyPI, so uploading a version here does NOT consume that version
# on the real index. Trigger from the Actions tab or `gh workflow run`.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-testpypi:
    name: Build and publish to TestPyPI
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/codex-subagent-router/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Run checks
        run: |
          uv run pytest
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy

      - name: Build distributions
        run: uv build --no-sources

      - name: Smoke test wheel command
        run: uv run --isolated --no-project --with dist/*.whl codex-subagent-router --help

      - name: Smoke test source distribution command
        run: uv run --isolated --no-project --with dist/*.tar.gz codex-subagent-router --help

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-distributions-testpypi
          path: dist/

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
